<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:
    radial-gradient(circle at top right, rgba(212,175,55,.18), transparent 35%),
    linear-gradient(135deg,#030303,#0b0b0b,#1c1204);
  color:white;
  font-family:Arial,sans-serif;
  overflow-x:hidden;
}

.company{
  max-width:1200px;
  margin:auto;
  padding:70px 20px;
}

.company img{
  width:160px;
  height:160px;
  object-fit:contain;
  display:block;
  margin:0 auto 28px;
  filter:drop-shadow(0 0 35px rgba(212,175,55,.45));
}

.company h1{
  text-align:center;
  color:#d4af37;
  font-size:46px;
  letter-spacing:4px;
  margin-bottom:45px;
}

.company-card{
  background:linear-gradient(145deg,#111,#191919);
  border:1px solid rgba(212,175,55,.35);
  padding:35px;
  border-radius:26px;
  margin-bottom:28px;
  box-shadow:
    0 20px 50px rgba(0,0,0,.45),
    inset 0 0 25px rgba(212,175,55,.04);
  transition:.35s ease;
}

.company-card:hover{
  transform:translateY(-8px) scale(1.01);
  box-shadow:
    0 30px 80px rgba(212,175,55,.18),
    0 0 35px rgba(212,175,55,.15);
  border-color:rgba(212,175,55,.65);
}

.company-card h2{
  color:#d4af37;
  margin-bottom:15px;
  font-size:28px;
}

.company-card p,
.company-card li{
  color:#f0f0f0;
  font-size:18px;
  line-height:1.8;
}

.company-card ul{
  padding-left:22px;
}

.company-card li{
  margin-bottom:8px;
}

.company-card a{
  color:#d4af37;
  text-decoration:none;
  font-weight:bold;
}

/* tombol kembali */
.back-btn{
  display:inline-block;
  margin-bottom:30px;
  padding:12px 22px;
  border-radius:999px;
  border:1px solid rgba(212,175,55,.5);
  color:#d4af37;
  text-decoration:none;
  font-weight:bold;
}

/* mobile */
@media(max-width:768px){
  .company{
    padding:45px 18px;
  }

  .company img{
    width:120px;
    height:120px;
  }

  .company h1{
    font-size:34px;
    letter-spacing:2px;
  }

  .company-card{
    padding:26px;
    border-radius:22px;
  }

  .company-card h2{
    font-size:24px;
  }

  .company-card p,
  .company-card li{
    font-size:16px;
  }
}
</style>
