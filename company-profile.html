<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  width:100%;
  overflow-x:hidden;
}

body{
  width:100%;
  min-height:100vh;
  background:
    radial-gradient(circle at top right, rgba(212,175,55,.16), transparent 32%),
    linear-gradient(135deg,#030303,#080808,#1c1204);
  color:#fff;
  font-family:Arial, Helvetica, sans-serif;
  overflow-x:hidden;
  line-height:1.7;
}

.company{
  width:100%;
  max-width:1050px;
  margin:0 auto;
  padding:50px 18px 70px;
}

.back-btn{
  display:inline-block;
  margin-bottom:28px;
  padding:12px 22px;
  border-radius:999px;
  border:1px solid rgba(212,175,55,.5);
  color:#d4af37;
  text-decoration:none;
  font-weight:800;
  background:rgba(0,0,0,.25);
}

.company-logo{
  width:130px;
  height:130px;
  object-fit:contain;
  display:block;
  margin:0 auto 22px;
  border-radius:50%;
  filter:drop-shadow(0 0 28px rgba(212,175,55,.45));
}

.company h1{
  text-align:center;
  color:#d4af37;
  font-size:38px;
  letter-spacing:3px;
  line-height:1.15;
  margin-bottom:38px;
}

.company-card{
  width:100%;
  max-width:100%;
  background:linear-gradient(145deg,#101010,#181818);
  border:1px solid rgba(212,175,55,.35);
  padding:28px;
  border-radius:24px;
  margin-bottom:24px;
  box-shadow:
    0 18px 45px rgba(0,0,0,.42),
    inset 0 0 20px rgba(212,175,55,.04);
  transition:.3s ease;
  overflow:hidden;
}

.company-card:hover{
  transform:translateY(-5px);
  box-shadow:
    0 25px 65px rgba(0,0,0,.55),
    0 0 28px rgba(212,175,55,.16);
  border-color:rgba(212,175,55,.6);
}

.company-card h2{
  color:#d4af37;
  margin-bottom:12px;
  font-size:26px;
  line-height:1.25;
}

.company-card p,
.company-card li{
  color:#eeeeee;
  font-size:17px;
  line-height:1.8;
}

.company-card ul{
  padding-left:22px;
}

.company-card li{
  margin-bottom:8px;
}

.company-card a{
  color:#d4af37;
  text-decoration:none;
  font-weight:800;
  word-break:break-word;
}

/* MOBILE */
@media(max-width:768px){
  .company{
    padding:34px 16px 55px;
  }

  .back-btn{
    font-size:14px;
    padding:10px 18px;
  }

  .company-logo{
    width:105px;
    height:105px;
    margin-bottom:18px;
  }

  .company h1{
    font-size:28px;
    letter-spacing:2px;
    margin-bottom:30px;
  }

  .company-card{
    padding:22px;
    border-radius:20px;
    margin-bottom:20px;
  }

  .company-card:hover{
    transform:none;
  }

  .company-card h2{
    font-size:22px;
  }

  .company-card p,
  .company-card li{
    font-size:15.5px;
    line-height:1.75;
  }
}
</style>
